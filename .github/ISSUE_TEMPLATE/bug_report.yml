name: Bug report
description: Report a reproducible problem in the NMOMA reproduction stack.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: symptom
    attributes:
      label: Symptom
      description: What happened, including the exact command and log.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python, ROS 2, MuJoCo, CUDA/GPU if relevant.
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification commands
      description: Which tests or smoke checks did you run?
